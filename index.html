<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intent Gateway Mode</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body {
      background:#0b1220;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container {
      width:100%; max-width:420px;
      background:#111827;
      border-radius:24px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1 { text-align:center; margin-bottom:8px; }

    .subtitle {
      text-align:center;
      color:#94a3b8;
      margin-bottom:20px;
      font-size:0.95rem;
    }

    .card {
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:16px;
      padding:16px;
      margin-top:12px;
    }

    button {
      width:100%;
      border:none;
      padding:14px;
      border-radius:14px;
      margin-top:10px;
      font-size:1rem;
      cursor:pointer;
    }

    .ig {
      background:#E1306C;
      color:white;
      font-weight:bold;
    }

    .secondary {
      background:#1e293b;
      color:white;
    }

    .danger {
      background:#ef4444;
      color:white;
    }

    .timer {
      font-size:2.5rem;
      text-align:center;
      margin:10px 0;
      font-weight:bold;
    }

    .small {
      color:#94a3b8;
      text-align:center;
      font-size:0.9rem;
    }

    input {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #334155;
      background:#0b1220;
      color:white;
      margin-top:10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Intent Gateway</h1>
  <p class="subtitle">Pause before autopilot</p>

  <div class="card">
    <div class="small">Daily opens</div>
    <div id="opens">0</div>

    <div class="small" style="margin-top:10px;">Mindless opens</div>
    <div id="mindless">0</div>
  </div>

  <div class="card">
    <div class="small">Why are you opening Instagram?</div>

    <input id="reason" placeholder="Type your reason (optional)" />

    <button class="ig" onclick="startGateway()">Open Instagram</button>
  </div>

  <div class="card" id="gate" style="display:none;">
    <div class="small" id="prompt">Think before you continue</div>

    <div class="timer" id="timer">5</div>

    <button class="secondary" id="continueBtn" style="display:none;" onclick="openIG()">Continue</button>
    <button class="danger" onclick="cancel()">Cancel</button>
  </div>

</div>

<script>
let t;
let count = 5;

function load() {
  document.getElementById('opens').innerText = localStorage.getItem('opens') || 0;
  document.getElementById('mindless').innerText = localStorage.getItem('mindless') || 0;
}

function startGateway() {
  document.getElementById('gate').style.display = 'block';

  let reason = document.getElementById('reason').value;

  if (!reason) reason = "No reason given";

  localStorage.setItem('lastReason', reason);

  count = 5;
  document.getElementById('timer').innerText = count;
  document.getElementById('continueBtn').style.display = 'none';

  clearInterval(t);

  t = setInterval(() => {
    count--;
    document.getElementById('timer').innerText = count;

    if (count <= 0) {
      clearInterval(t);
      document.getElementById('timer').innerText = "✓";
      document.getElementById('continueBtn').style.display = 'block';
    }
  }, 1000);

  let opens = parseInt(localStorage.getItem('opens') || 0);
  opens++;
  localStorage.setItem('opens', opens);

  if (reason.toLowerCase().includes("mindless")) {
    let m = parseInt(localStorage.getItem('mindless') || 0);
    m++;
    localStorage.setItem('mindless', m);
  }

  load();
}

function openIG() {
  window.location.href = "instagram://";

  setTimeout(() => {
    window.location.href = "https://instagram.com";
  }, 1000);
}

function cancel() {
  document.getElementById('gate').style.display = 'none';
}

load();
</script>

</body>
</html>
